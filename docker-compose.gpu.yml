# GPU override — use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# Requirements: NVIDIA drivers (CUDA 12.2+), nvidia-container-toolkit
# NOTE: Also set EMBEDDING_MODEL, EMBEDDING_DIMENSION in your .env (see .env.gpu.example)
services:
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9.2
    command:
      [
        "--model-id",
        "jinaai/jina-embeddings-v5-text-small-retrieval",
        "--pooling",
        "last-token",
        "--tokenization-workers",
        "12",
        "--port",
        "80",
        "--auto-truncate",
        "--max-client-batch-size",
        "64",
        "--max-batch-tokens",
        "65536",
      ]
    deploy:
      resources:
        limits:
          memory: 20G
          cpus: "12"
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  milvus-db:
    image: milvusdb/milvus:v2.4.21-gpu
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

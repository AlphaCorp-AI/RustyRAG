services:
  postgres:
    image: postgres:16-alpine
    container_name: alpharust_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: alpharust
      POSTGRES_PASSWORD: alpharust
      POSTGRES_DB: alpharust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  milvus-db:
    image: milvusdb/milvus:v2.4.21
    container_name: alpharust_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - alpharust_milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  pgdata:
  alpharust_milvus_data:

services:
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: alpharust_embeddings
    restart: unless-stopped
    command:
      [
        "--model-id",
        "jinaai/jina-embeddings-v5-text-nano-retrieval",
        "--pooling",
        "last-token",
        "--tokenization-workers",
        "2",
        "--max-concurrent-requests",
        "64",
        "--max-client-batch-size",
        "8",
        "--max-batch-tokens",
        "2048",
        "--port",
        "80",
        "--auto-truncate",
      ]
    environment:
      HF_HOME: /data
    volumes:
      - hf_cache:/data
    ports:
      - "7997:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  milvus-db:
    image: milvusdb/milvus:v2.4.21
    container_name: alpharust_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - alpharust_milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  hf_cache:
  alpharust_milvus_data:

services:
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9
    container_name: rustyrag_embeddings
    restart: unless-stopped
    command:
      [
        "--model-id",
        "jinaai/jina-embeddings-v5-text-small-retrieval",
        "--pooling",
        "last-token",
        "--tokenization-workers",
        "16",
        "--port",
        "80",
        "--auto-truncate",
        "--max-client-batch-size",
        "128",
        "--max-batch-tokens",
        "131072",
      ]
    environment:
      HF_HOME: /data
    volumes:
      - hf_cache:/data
    ports:
      - "7997:80"
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "8"
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9
    container_name: rustyrag_reranker
    restart: unless-stopped
    command:
      [
        "--model-id",
        "Alibaba-NLP/gte-reranker-modernbert-base",
        "--port",
        "80",
        "--auto-truncate",
      ]
    environment:
      HF_HOME: /data
    volumes:
      - hf_cache:/data
    ports:
      - "7998:80"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "6"
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  docling:
    image: quay.io/docling-project/docling-serve-cu128:v1.14.3
    container_name: rustyrag_docling
    restart: unless-stopped
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_HOST: "0.0.0.0"
      DOCLING_SERVE_PORT: "5001"
      DOCLING_SERVE_MAX_SYNC_WAIT: "600"
      DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "2"
      DOCLING_SERVE_ENG_LOC_SHARE_MODELS: "True"
    ports:
      - "5001:5001"
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "8"
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  milvus-db:
    image: milvusdb/milvus:v2.5.27
    container_name: rustyrag_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - rustyrag_milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "8"
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  hf_cache:
  rustyrag_milvus_data:

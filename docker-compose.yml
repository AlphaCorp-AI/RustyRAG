services:
  postgres:
    image: postgres:16-alpine
    container_name: alpharust_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: alpharust
      POSTGRES_PASSWORD: alpharust
      POSTGRES_DB: alpharust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
